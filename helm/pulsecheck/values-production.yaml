# Standalone production values for K3s on the VPS.
# Install:
#   helm upgrade --install pulsecheck . \
#     -f values-production.yaml \
#     -f values-secrets-production.yaml

image:
  pullPolicy: IfNotPresent

frontend:
  image:
    repository: ghcr.io/kavindujayarathne/pulsecheck-frontend
    tag: "REPLACED_AT_DEPLOY"
  replicas: 1
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

api:
  image:
    repository: ghcr.io/kavindujayarathne/pulsecheck-api
    tag: "REPLACED_AT_DEPLOY"
  replicas: 1
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # HPA disabled on single-node K3s. Revisit if VPS gains nodes or worker is split.
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

worker:
  image:
    repository: ghcr.io/kavindujayarathne/pulsecheck-worker
    tag: "REPLACED_AT_DEPLOY"
  replicas: 1
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

postgres:
  image:
    repository: postgres
    tag: 16-alpine
  service:
    port: 5432
  storage:
    size: 1Gi
    storageClassName: local-path
  auth:
    username: pulsecheck
    database: pulsecheck
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

redis:
  image:
    repository: redis
    tag: 7-alpine
  service:
    port: 6379
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

ingress:
  enabled: true
  className: nginx
  host: pulsecheck.kavindujayarathne.com
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - hosts:
        - pulsecheck.kavindujayarathne.com
      secretName: pulsecheck-tls

env:
  oauthRedirectBaseUrl: https://pulsecheck.kavindujayarathne.com
  frontendUrl: https://pulsecheck.kavindujayarathne.com

secrets:
  postgresPassword: ""
  secretKey: ""
  googleClientId: ""
  googleClientSecret: ""
  githubClientId: ""
  githubClientSecret: ""
