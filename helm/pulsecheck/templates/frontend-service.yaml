apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    {{- include "pulsecheck.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: 8080
      protocol: TCP
  selector:
    {{- include "pulsecheck.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
