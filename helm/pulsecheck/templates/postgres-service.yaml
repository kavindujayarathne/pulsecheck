apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    {{- include "pulsecheck.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.postgres.service.port }}
      targetPort: 5432
      protocol: TCP
  selector:
    {{- include "pulsecheck.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
