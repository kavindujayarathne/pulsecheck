# Template for ALL secrets files (gitignored). Copy this to one of:
#
#   values-secrets.yaml                       (Kind layer; used by `make cluster-up`)
#   values-secrets-production-local.yaml      (k3d local-prod layer; used by `make -f Makefile.prod local-prod-up`)
#   values-secrets-production.yaml            (Real VPS production; used by `make -f Makefile.prod deploy-prod`)
#
# Each file uses the SAME schema below; only the values differ per environment.
#
# Generate random values locally:
#   openssl rand -base64 32   # postgresPassword
#   openssl rand -hex 32      # secretKey
#
# OAuth credentials come from per-environment OAuth apps registered in
# GitHub Developer Settings and Google Cloud Console. See README / docs for
# the OAuth app naming convention and callback URLs per environment.

secrets:
  postgresPassword: "replace-with-strong-random-password"
  secretKey: "replace-with-32-byte-random-hex"
  googleClientId: ""
  googleClientSecret: ""
  githubClientId: ""
  githubClientSecret: ""
